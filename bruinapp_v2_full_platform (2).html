function getInitials(name){return(name||'?').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()}
function getAvatarColor(name){const i=(name||'A').charCodeAt(0)%COLORS.length;return COLORS[i]}
function fmtDate(d){try{return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}catch{return d}}
function wordCount(s){return s?s.trim().split(/\s+/).filter(Boolean).length:0}
function avg(arr){return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0}
function median(arr){if(!arr.length)return 0;const s=[...arr].sort((a,b)=>a-b);const m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2}

// ─── MAIN APP ──────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [clubs,setClubs]=useState(CLUBS_INIT);
  const [applications,setApplications]=useState(APPS_INIT);
  const [page,setPage]=useState('dashboard');
  const [modal,setModal]=useState(null);
  const [savedClubs,setSavedClubs]=useState([]);
  const [commonApp,setCommonApp]=useState({firstName:'',lastName:'',uclaGpa:'',hsGpa:'',prevGpa:'',prevGpaSource:'',uclaEmail:'',year:'',gradYear:'',major:'',major2:'',minors:[]});

  if(!user)return h(LoginScreen,{onLogin:setUser});
  const ctx={user,setUser,clubs,setClubs,applications,setApplications,page,setPage,modal,setModal,savedClubs,setSavedClubs,commonApp,setCommonApp};
  if(user.role==='admin')return h(AdminApp,ctx);
  if(user.role==='leader')return h(LeaderApp,ctx);
  return h(ApplicantApp,ctx);
}

// ─── LOGIN ─────────────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [tab,setTab]=useState('applicant');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [regEmail,setRegEmail]=useState('');
  const [regName,setRegName]=useState('');
  const [regPw,setRegPw]=useState('');
  const [error,setError]=useState('');
  const [mode,setMode]=useState('login');

  function handleLogin(){
    setError('');
    const u=USERS_INIT.find(u=>u.email===email&&u.password===pw);
    if(!u){setError('Invalid email or password.');return;}
    if(tab==='applicant'&&u.role!=='applicant'){setError('Not a student account.');return;}
    if(tab==='leader'&&u.role!=='leader'){setError('Not a club leader account.');return;}
    if(tab==='admin'&&u.role!=='admin'){setError('Admin credentials required.');return;}
    onLogin(u);
  }
  function handleRegister(){
    setError('');
    if(!regName){setError('Name required.');return;}
    if(!regEmail.endsWith('@g.ucla.edu')&&!regEmail.endsWith('@ucla.edu')){setError('Must use a @g.ucla.edu or @ucla.edu email.');return;}
    if(regPw.length<6){setError('Password must be 6+ characters.');return;}
    const newUser={id:'A'+Date.now(),email:regEmail,password:regPw,role:'applicant',name:regName,applicantId:Date.now()};
    USERS_INIT.push(newUser);
    onLogin(newUser);
  }
  const demos={applicant:'mayachen@g.ucla.edu / student123',leader:'leader@bruinentrepreneurs.com / leader123',admin:'zach@admin.bruinapp.com / admin123'};
  return h('div',{className:'welcome-screen'},
    h('div',{className:'welcome-card'},
      h('div',{className:'welcome-logo',style:{marginBottom:22}},
        h('h1',null,'BruinApp'),
        h('div',{className:'sub'},'UCLA CLUB APPLICATIONS'),
        h('div',{style:{width:40,height:3,background:'#FFD100',margin:'8px auto 0',borderRadius:2}})
      ),
      h('div',{className:'role-tabs'},
        ['applicant','leader','admin'].map(r=>h('div',{key:r,className:'role-tab'+(tab===r?' active':''),onClick:()=>{setTab(r);setError('');setMode('login')}},{applicant:'Student',leader:'Club Leader',admin:'Admin'}[r]))
      ),
      tab==='applicant'&&mode==='register'
        ?h('div',null,
            h('div',{className:'form-group'},h('label',null,'Full Name'),h('input',{value:regName,onChange:e=>setRegName(e.target.value),placeholder:'Your full name'})),
            h('div',{className:'form-group'},h('label',null,'UCLA Email'),h('input',{value:regEmail,onChange:e=>setRegEmail(e.target.value),placeholder:'yourname@g.ucla.edu'})),
            h('div',{className:'form-group'},h('label',null,'Password'),h('input',{type:'password',value:regPw,onChange:e=>setRegPw(e.target.value)})),
            error&&h('div',{className:'error-msg'},error),
            h('button',{className:'btn-primary',style:{width:'100%',marginBottom:8},onClick:handleRegister},'Create Account'),
            h('button',{className:'btn-ghost',style:{width:'100%'},onClick:()=>{setMode('login');setError('')}},'Already have an account? Sign in')
          )
        :h('div',null,
            h('div',{className:'form-group'},h('label',null,'Email'),h('input',{value:email,onChange:e=>setEmail(e.target.value),onKeyDown:e=>e.key==='Enter'&&handleLogin()})),
            h('div',{className:'form-group'},h('label',null,'Password'),h('input',{type:'password',value:pw,onChange:e=>setPw(e.target.value),onKeyDown:e=>e.key==='Enter'&&handleLogin()})),
            error&&h('div',{className:'error-msg'},error),
            h('button',{className:'btn-primary',style:{width:'100%',marginBottom:8},onClick:handleLogin},'Sign In'),
            tab==='applicant'&&h('button',{className:'btn-ghost',style:{width:'100%'},onClick:()=>{setMode('register');setError('')}},'New student? Create account'),
            h('div',{style:{marginTop:12,padding:'9px',background:'#f5f3ee',borderRadius:7,fontSize:11,color:'#666'}},h('strong',null,'Demo: '),demos[tab])
          )

function ApplicationModal({modal,setModal,applications,setApplications,user,myApplicant,commonApp,clubs}){
  const club=modal.club;
  const [answers,setAnswers]=useState(club.questions.map(()=>''));
  const [uploads,setUploads]=useState(club.questions.map(()=>''));
  const [submitted,setSubmitted]=useState(false);

  function submit(){
    const missing=club.questions.findIndex((q,i)=>q.mandatory&&!answers[i].trim());
    if(missing>=0){alert('Question '+(missing+1)+' is required.');return;}
    const over=club.questions.findIndex((q,i)=>q.wordLimit&&wordCount(answers[i])>q.wordLimit);
    if(over>=0){alert('Question '+(over+1)+' exceeds the word limit of '+club.questions[over].wordLimit+' words.');return;}
    const newApp={id:Date.now(),clubId:club.id,applicantId:user.applicantId||user.id,status:'pending',submitted:new Date().toISOString().split('T')[0],answers,uploads};
    setApplications(prev=>[...prev,newApp]);
    setSubmitted(true);
  }

function LeaderAnalytics({myClub,myApps}){
  const outcomes=myClub.outcomes||['pending','accepted','rejected','interview'];
  function appsInGroup(status){return myApps.filter(a=>a.status===status).map(a=>APPLICANTS_INIT.find(x=>x.id===a.applicantId)).filter(Boolean)}
  function gpaArr(apps){return apps.map(a=>parseFloat(a.uclaGpa)).filter(Boolean)}
  function yearCounts(apps){const c={};apps.forEach(a=>{c[a.year]=(c[a.year]||0)+1});return c}
  function transferPct(apps){return apps.length?Math.round(apps.filter(a=>a.year&&a.year.includes('Transfer')).length/apps.length*100):0}

  const allAps=myApps.map(a=>APPLICANTS_INIT.find(x=>x.id===a.applicantId)).filter(Boolean);
  const groups=outcomes.map(o=>({status:o,apps:appsInGroup(o)}));

  return h('div',null,
    h('div',{className:'page-header'},h('h1',null,'Analytics'),h('p',null,'Objective metrics for '+myClub.name+' applicants')),
    h('div',{className:'card',style:{marginBottom:16}},
      h('div',{className:'section-title'},'Overall Pool ('+myApps.length+' applicants)'),
      h('div',{className:'three-col'},
        h('div',{className:'stat-card'},
          h('div',{className:'num',style:{fontSize:20}},allAps.length?avg(gpaArr(allAps)).toFixed(2):'—'),
          h('div',{className:'lbl'},'Avg UCLA GPA')
        ),
        h('div',{className:'stat-card'},
          h('div',{className:'num',style:{fontSize:20}},allAps.length?median(gpaArr(allAps)).toFixed(2):'—'),
          h('div',{className:'lbl'},'Median UCLA GPA')
        ),
        h('div',{className:'stat-card'},
          h('div',{className:'num',style:{fontSize:20}},transferPct(allAps)+'%'),
          h('div',{className:'lbl'},'Transfer Students')
        )
      )
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:14}},
      groups.map(({status,apps})=>{
        if(!apps.length)return null;
        const gpas=gpaArr(apps);
        const yc=yearCounts(apps);
        return h('div',{key:status,className:'card'},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
            h('div',{style:{fontWeight:700,fontSize:14}},status.charAt(0).toUpperCase()+status.slice(1)),
            h('span',{className:'badge badge-'+status},apps.length+' applicants')
          ),
          h('div',{style:{marginBottom:8}},
            h('div',{style:{fontSize:12,color:'#888',marginBottom:2}},'UCLA GPA'),
            gpas.length
              ?h('div',{style:{fontSize:13}},h('span',{style:{marginRight:12}},h('strong',null,'Avg: '),avg(gpas).toFixed(2)),h('span',null,h('strong',null,'Median: '),median(gpas).toFixed(2)))
              :h('div',{style:{fontSize:12,color:'#aaa'}},'No GPA data')
          ),
          h('div',null,
            h('div',{style:{fontSize:12,color:'#888',marginBottom:4}},'Year Breakdown'),
            Object.entries(yc).map(([yr,cnt])=>
              h('div',{key:yr,style:{display:'flex',justifyContent:'space-between',fontSize:12,padding:'2px 0'}},
                h('span',null,yr),h('span',{style:{fontWeight:600}},cnt+' ('+Math.round(cnt/apps.length*100)+'%)')
              )
            )
          )
        );
      })
    )
  );
}

    tab==='outcomes'&&h('div',null,
      h('div',{className:'card'},
        h('div',{className:'section-title'},'Decision Outcomes'),
        h('p',{style:{fontSize:13,color:'#666',marginBottom:14}},'Choose which outcome options your reviewers can assign. "Pending" is always included.'),
        h('div',{style:{display:'flex',flexWrap:'wrap',gap:10}},
          ['interview','accepted','rejected','waitlisted','offer'].map(o=>{
            const checked=club.outcomes.includes(o);
            const colors={interview:'#cce5ff',accepted:'#d4edda',rejected:'#f8d7da',waitlisted:'#e2e3e5',offer:'#d4edda'};
            return h('label',{key:o,style:{display:'flex',alignItems:'center',gap:8,padding:'10px 16px',borderRadius:10,border:'2px solid '+(checked?'#2774AE':'#e0ddd6'),background:checked?colors[o]:'#fff',cursor:'pointer',fontSize:13,fontWeight:600}},
              h('input',{type:'checkbox',checked,onChange:()=>toggleOutcome(o)}),
              o.charAt(0).toUpperCase()+o.slice(1)
            );
          })
        ),
        h('div',{style:{marginTop:16,padding:'12px',background:'#f5f3ee',borderRadius:8,fontSize:12,color:'#666'}},
          h('strong',null,'Active outcomes: '),['pending',...club.outcomes].join(', ')
        )
      )
    ),
    tab==='team'&&h('div',null,
      h('div',{className:'card',style:{marginBottom:14}},
        h('div',{className:'section-title'},'Tags (for search)'),
        h('p',{style:{fontSize:12,color:'#666',marginBottom:10}},'Select all tags that apply. These help students find your club.'),
        h('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},
          ALL_TAGS.map(t=>h('span',{key:t,className:'tag-pill'+(club.tags.includes(t)?' selected':''),onClick:()=>toggleTag(t),style:{cursor:'pointer'}},t))
        )
      ),
      h('div',{className:'card'},
        h('div',{className:'section-title'},'Shared Reviewers'),
        h('p',{style:{fontSize:12,color:'#666',marginBottom:10}},'Add co-leaders or members who can review applications.'),
        club.reviewers.map((r,i)=>
          h('div',{key:i,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid #f0ede8'}},
            h('span',{style:{fontSize:13}},r),
            r!==user.email&&h('button',{onClick:()=>setClub({...club,reviewers:club.reviewers.filter((_,j)=>j!==i)}),style:{background:'#fee2e2',color:'#dc2626',border:'none',borderRadius:4,padding:'2px 8px',cursor:'pointer',fontSize:11}},'Remove')
          )
        ),
        h('div',{style:{display:'flex',gap:8,marginTop:10}},
          h('input',{value:newReviewer,onChange:e=>setNewReviewer(e.target.value),placeholder:'Reviewer email address',style:{flex:1}}),
          h('button',{className:'btn-primary btn-sm',onClick:addReviewer},'+Add')
        )
      )
    )
  );
}

// ─── ADMIN APP ─────────────────────────────────────────────────────────────
function AdminApp({user,clubs,setClubs,applications,setApplications,page,setPage,modal,setModal,setUser}){
  const nav=[
    {id:'dashboard',label:'Overview',icon:'📊'},
    {id:'clubs',label:'Manage Clubs',icon:'🏛️'},
    {id:'users',label:'Users',icon:'👤'},
    {id:'applications',label:'All Applications',icon:'📋'},
  ];
  return h(Shell,{user,navItems:nav,page,setPage,setUser},
    h('div',{className:'main-content'},
      page==='dashboard'&&h(AdminDashboard,{clubs,applications}),
      page==='clubs'&&h(AdminClubs,{clubs,setClubs,modal,setModal}),
      page==='users'&&h(AdminUsers),
      page==='applications'&&h(AdminApplications,{applications,setApplications,clubs}),
      modal&&modal.type==='new-club'&&h(NewClubModal,{setModal,setClubs,clubs})
    )
  );
}

function AdminDashboard({clubs,applications}){
  const openClubs=clubs.filter(c=>c.open).length;
  const catCounts={};clubs.forEach(c=>catCounts[c.category]=(catCounts[c.category]||0)+1);
  const sCounts={};OUTCOMES.forEach(o=>sCounts[o]=0);applications.forEach(a=>sCounts[a.status]=(sCounts[a.status]||0)+1);
  return h('div',null,
    h('div',{className:'page-header'},h('h1',null,'Admin Overview'),h('p',null,'Full platform metrics')),
    h('div',{className:'stat-grid'},
      h('div',{className:'stat-card'},h('div',{className:'num'},clubs.length),h('div',{className:'lbl'},'Clubs')),
      h('div',{className:'stat-card'},h('div',{className:'num'},openClubs),h('div',{className:'lbl'},'Open')),
      h('div',{className:'stat-card'},h('div',{className:'num'},applications.length),h('div',{className:'lbl'},'Applications')),
      h('div',{className:'stat-card'},h('div',{className:'num',style:{color:'#f59e0b'}},sCounts.pending),h('div',{className:'lbl'},'Pending')),
      h('div',{className:'stat-card'},h('div',{className:'num',style:{color:'#16a34a'}},sCounts.accepted+(sCounts.offer||0)),h('div',{className:'lbl'},'Accepted')),
      h('div',{className:'stat-card'},h('div',{className:'num',style:{color:'#2563eb'}},sCounts.interview),h('div',{className:'lbl'},'Interview')),
      h('div',{className:'stat-card'},h('div',{className:'num'},USERS_INIT.filter(u=>u.role==='applicant').length),h('div',{className:'lbl'},'Students'))
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}},
      h('div',{className:'card'},
        h('div',{className:'section-title'},'Clubs by Category'),
        Object.entries(catCounts).map(([cat,count])=>
          h('div',{key:cat,style:{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid #f0ede8',fontSize:13}},h('span',null,cat),h('span',{style:{fontWeight:700,color:'#2774AE'}},count))
        )
      ),
      h('div',{className:'card'},
        h('div',{className:'section-title'},'Application Breakdown'),
        OUTCOMES.map(s=>{
          const cnt=applications.filter(a=>a.status===s).length;
          const pct=applications.length?Math.round(cnt/applications.length*100):0;
          const colors={pending:'#f59e0b',accepted:'#16a34a',rejected:'#dc2626',waitlisted:'#6b7280',interview:'#2563eb',offer:'#16a34a'};
          return h('div',{key:s,style:{marginBottom:8}},
            h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:2}},h('span',null,s.charAt(0).toUpperCase()+s.slice(1)),h('span',null,cnt+' ('+pct+'%)')),
            h('div',{className:'progress-bar-wrap'},h('div',{className:'progress-bar-fill',style:{width:pct+'%',background:colors[s]||'#999'}}))
          );
        })
      )
    )
  );
}

function AdminClubs({clubs,setClubs,modal,setModal}){
  function toggleOpen(id){setClubs(prev=>prev.map(c=>c.id===id?{...c,open:!c.open}:c))}
  function del(id){if(confirm('Delete this club?'))setClubs(prev=>prev.filter(c=>c.id!==id))}
  return h('div',null,
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:22}},
      h('div',{className:'page-header',style:{marginBottom:0}},h('h1',null,'Manage Clubs'),h('p',null,clubs.length+' clubs registered')),
      h('button',{className:'btn-primary',onClick:()=>setModal({type:'new-club'})},'+Add Club')
    ),
    h('div',{className:'card',style:{padding:0,overflow:'hidden'}},
      h('table',null,
        h('thead',null,h('tr',null,h('th',null,'Club'),h('th',null,'Tags'),h('th',null,'Status'),h('th',null,'Deadline'),h('th',null,'Actions'))),
        h('tbody',null,
          clubs.map(club=>h('tr',{key:club.id},
            h('td',null,h('div',{style:{display:'flex',alignItems:'center',gap:8}},h('span',{style:{fontSize:18}},club.logo),h('div',null,h('div',{style:{fontWeight:600,fontSize:13}},club.name),h('div',{style:{fontSize:11,color:'#888'}},club.category)))),
            h('td',null,club.tags.slice(0,2).map(t=>h('span',{key:t,className:'tag',style:{fontSize:10}},t))),
            h('td',null,h('span',{className:'badge '+(club.open?'badge-open':'badge-closed')},club.open?'Open':'Closed')),
            h('td',{style:{fontSize:12,color:'#666'}},fmtDate(club.deadline)),
            h('td',null,h('div',{style:{display:'flex',gap:6}},
              h('button',{className:'btn-ghost btn-sm',onClick:()=>toggleOpen(club.id)},club.open?'Close':'Open'),
              h('button',{className:'btn-danger btn-sm',onClick:()=>del(club.id)},'Delete')
            ))
          ))
        )
      )
    ),
    modal&&modal.type==='new-club'&&h(NewClubModal,{setModal,setClubs,clubs})
  );
}

function NewClubModal({setModal,setClubs,clubs}){
  const [form,setForm]=useState({name:'',category:CATEGORIES[0],desc:'',deadline:'',open:true,logo:'📌',tags:[],questions:[{text:'',mandatory:true,wordLimit:200,allowUpload:false}],outcomes:['interview','accepted','rejected'],reviewers:[]});
  function save(){
    if(!form.name||!form.deadline||!form.desc){alert('Fill required fields.');return;}
    setClubs(prev=>[...prev,{...form,id:Date.now(),color:COLORS[clubs.length%COLORS.length]}]);
    setModal(null);
  }
  function toggleTag(t){const ts=form.tags.includes(t)?form.tags.filter(x=>x!==t):[...form.tags,t];setForm({...form,tags:ts})}
  return h('div',{className:'modal-overlay',onClick:e=>{if(e.target.className==='modal-overlay')setModal(null)}},
    h('div',{className:'modal'},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
        h('h2',null,'Add New Club'),
        h('button',{onClick:()=>setModal(null),style:{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#999'}},'×')
      ),
      h('div',{className:'two-col'},
        h('div',{className:'form-group'},h('label',null,'Club Name *'),h('input',{value:form.name,onChange:e=>setForm({...form,name:e.target.value})})),
        h('div',{className:'form-group'},h('label',null,'Logo Emoji'),h('input',{value:form.logo,onChange:e=>setForm({...form,logo:e.target.value}),style:{maxWidth:80}}))
      ),
      h('div',{className:'form-group'},h('label',null,'Category'),h('select',{value:form.category,onChange:e=>setForm({...form,category:e.target.value})},CATEGORIES.map(c=>h('option',{key:c},c)))),
      h('div',{className:'form-group'},h('label',null,'Description *'),h('textarea',{value:form.desc,onChange:e=>setForm({...form,desc:e.target.value}),rows:2})),
      h('div',{className:'two-col'},
        h('div',{className:'form-group'},h('label',null,'Deadline *'),h('input',{type:'date',value:form.deadline,onChange:e=>setForm({...form,deadline:e.target.value})})),
        h('div',{className:'form-group'},h('label',null,'Status'),h('select',{value:form.open?'open':'closed',onChange:e=>setForm({...form,open:e.target.value==='open'})},h('option',{value:'open'},'Open'),h('option',{value:'closed'},'Closed')))
      ),
      h('div',{className:'form-group'},h('label',null,'Tags'),h('div',{style:{display:'flex',flexWrap:'wrap',gap:4,marginTop:4}},ALL_TAGS.map(t=>h('span',{key:t,className:'tag-pill'+(form.tags.includes(t)?' selected':''),onClick:()=>toggleTag(t),style:{cursor:'pointer',fontSize:11}},t)))),
      h('div',{style:{display:'flex',gap:10,justifyContent:'flex-end',marginTop:14}},
        h('button',{className:'btn-ghost',onClick:()=>setModal(null)},'Cancel'),
        h('button',{className:'btn-primary',onClick:save},'Create Club')
      )
    )
  );
}

function AdminUsers(){
  const leaders=USERS_INIT.filter(u=>u.role==='leader');
  return h('div',null,
    h('div',{className:'page-header'},h('h1',null,'Users'),h('p',null,'All platform accounts')),
    h('h3',{className:'section-title'},'Club Leaders'),
    h('div',{className:'card',style:{padding:0,overflow:'hidden',marginBottom:20}},
      h('table',null,
        h('thead',null,h('tr',null,h('th',null,'Leader'),h('th',null,'Email'),h('th',null,'Club'))),
        h('tbody',null,leaders.map(u=>h('tr',{key:u.id},
          h('td',null,h('div',{style:{display:'flex',alignItems:'center',gap:8}},h('div',{className:'avatar',style:{background:getAvatarColor(u.name)}},getInitials(u.name)),h('span',{style:{fontWeight:600,fontSize:13}},u.name))),
          h('td',{style:{fontSize:12,color:'#666'}},u.email),
          h('td',null,h('span',{className:'tag'},CLUBS_INIT.find(c=>c.id===u.clubId)?.name||'Unassigned'))
        )))
      )
    ),
    h('h3',{className:'section-title'},'Student Applicants'),
    h('div',{className:'card',style:{padding:0,overflow:'hidden'}},
      h('table',null,
        h('thead',null,h('tr',null,h('th',null,'Student'),h('th',null,'Email'),h('th',null,'Year'),h('th',null,'Major'),h('th',null,'UCLA GPA'))),
        h('tbody',null,APPLICANTS_INIT.map((ap,i)=>h('tr',{key:i},
          h('td',null,h('div',{style:{display:'flex',alignItems:'center',gap:8}},h('div',{className:'avatar',style:{background:getAvatarColor(ap.name),width:28,height:28,fontSize:10}},getInitials(ap.name)),h('span',{style:{fontWeight:600,fontSize:13}},ap.name))),
          h('td',{style:{fontSize:12,color:'#666'}},ap.email),
          h('td',{style:{fontSize:12}},ap.year),
          h('td',{style:{fontSize:12}},ap.major+(ap.major2?' / '+ap.major2:'')),
          h('td',{style:{fontSize:12,fontWeight:600,color:'#2774AE'}},ap.uclaGpa||'—')
        )))
      )
    )
  );
}

function AdminApplications({applications,setApplications,clubs}){
  const [cf,setCf]=useState('all');
  const [sf,setSf]=useState('all');
  const filtered=applications.filter(a=>(cf==='all'||a.clubId===parseInt(cf))&&(sf==='all'||a.status===sf));
  function override(id,status){setApplications(prev=>prev.map(a=>a.id===id?{...a,status}:a))}
  const sc={'pending':'badge-pending','accepted':'badge-accepted','rejected':'badge-rejected','waitlisted':'badge-waitlisted','interview':'badge-interview','offer':'badge-offer'};
  return h('div',null,
    h('div',{className:'page-header'},h('h1',null,'All Applications'),h('p',null,applications.length+' across all clubs')),
    h('div',{style:{display:'flex',gap:10,marginBottom:16}},
      h('select',{value:cf,onChange:e=>setCf(e.target.value),style:{maxWidth:200}},h('option',{value:'all'},'All Clubs'),clubs.map(c=>h('option',{key:c.id,value:c.id},c.logo+' '+c.name))),
      h('select',{value:sf,onChange:e=>setSf(e.target.value),style:{maxWidth:160}},h('option',{value:'all'},'All Statuses'),OUTCOMES.map(s=>h('option',{key:s,value:s},s.charAt(0).toUpperCase()+s.slice(1))))
    ),
    h('div',{className:'card',style:{padding:0,overflow:'hidden'}},
      h('table',null,
        h('thead',null,h('tr',null,h('th',null,'Applicant'),h('th',null,'Club'),h('th',null,'GPA'),h('th',null,'Date'),h('th',null,'Status'),h('th',null,'Override'))),
        h('tbody',null,
          filtered.map(app=>{
            const ap=APPLICANTS_INIT.find(a=>a.id===app.applicantId)||{name:'Unknown',email:'',uclaGpa:null};
            const club=clubs.find(c=>c.id===app.clubId)||{name:'Unknown',logo:'📌'};
            return h('tr',{key:app.id},
              h('td',null,h('div',{style:{display:'flex',alignItems:'center',gap:8}},h('div',{className:'avatar',style:{background:getAvatarColor(ap.name),width:26,height:26,fontSize:9}},getInitials(ap.name)),h('div',{style:{fontWeight:600,fontSize:13}},ap.name))),
              h('td',{style:{fontSize:12}},club.logo+' '+club.name),
              h('td',{style:{fontSize:12,color:'#2774AE',fontWeight:600}},ap.uclaGpa||'—'),
              h('td',{style:{fontSize:11,color:'#888'}},fmtDate(app.submitted)),
              h('td',null,h('span',{className:'badge '+(sc[app.status]||'badge-pending')},app.status.charAt(0).toUpperCase()+app.status.slice(1))),
              h('td',null,h('select',{value:app.status,onChange:e=>override(app.id,e.target.value),style:{padding:'3px 6px',fontSize:11,width:'auto'}},OUTCOMES.map(s=>h('option',{key:s,value:s},s.charAt(0).toUpperCase()+s.slice(1)))))
            );
          })
        )
      )
    )
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(h(App));
</script>
